<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LingoFlux | Создание публикации</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="create">
  <div id="site-header"></div>

  <main class="page">
    <section class="section-block">
      <div class="section-heading">
        <p class="eyebrow">СОЗДАНИЕ ПУБЛИКАЦИИ</p>
        <h1>Добавление материала в блог</h1>
      </div>
      <form class="form-card editor-form" id="post-form" novalidate>
        <label>
          <span>Заголовок статьи</span>
          <input id="post-title" type="text" required>
        </label>
        <p class="field-error hidden" id="post-title-error">Заголовок должен быть не короче 4 символов.</p>
        <label>
          <span>Краткое описание</span>
          <input id="post-summary" type="text" placeholder="Короткий анонс публикации">
        </label>
        <label>
          <span>Содержание</span>
          <textarea id="post-body" rows="12" required placeholder="Поддерживается простая markdown-разметка: **жирный**, *курсив*, списки через -"></textarea>
        </label>
        <p class="field-error hidden" id="post-body-error">Текст публикации должен быть не короче 20 символов.</p>
        <div class="file-row">
          <label class="button ghost file-button" for="post-file">ДОБАВИТЬ ФАЙЛ</label>
          <input id="post-file" type="file" accept="image/*,.pdf,.doc,.docx,.txt" hidden>
          <span id="file-name">Файл не выбран</span>
        </div>
        <div class="attachment-preview hidden" id="attachment-preview"></div>
        <div class="action-row form-actions">
          <button class="button ghost" id="preview-button" type="button">ПРЕДПРОСМОТР</button>
          <button class="button solid" id="publish-button" type="submit" disabled>ОТПРАВИТЬ</button>
        </div>
        <p class="form-note" id="post-status">Заполните заголовок и содержание публикации.</p>
      </form>

      <div class="submission-card hidden" id="post-result"></div>
    </section>

    <section class="section-block">
      <div class="section-heading">
        <p class="eyebrow">СОХРАНЕННЫЕ ПУБЛИКАЦИИ</p>
        <h2>Текущий список постов</h2>
      </div>
      <div class="blog-grid" id="editor-post-list"></div>
    </section>
  </main>

  <div class="modal hidden" id="preview-modal">
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-panel">
      <button class="modal-close" type="button" data-close-modal>x</button>
      <div id="preview-content"></div>
    </div>
  </div>

  <div id="site-footer"></div>

  <script src="main.js"></script>
  <script src="data-service.js"></script>
  <script src="create-post.js"></script>
</body>
</html>
