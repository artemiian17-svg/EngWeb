name: C++ backend

on:
  push:
    paths:
      - "cpp-backend-showcase/**"
      - ".github/workflows/cpp-backend.yml"
  pull_request:
    paths:
      - "cpp-backend-showcase/**"
      - ".github/workflows/cpp-backend.yml"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S cpp-backend-showcase -B cpp-backend-showcase/build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build cpp-backend-showcase/build --config Release --parallel

      - name: Test
        run: ctest --test-dir cpp-backend-showcase/build --output-on-failure
