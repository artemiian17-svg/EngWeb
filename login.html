<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LingoFlux | Авторизация</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="hidden">
  <div id="site-header"></div>

  <main class="page auth-page">
    <section class="section-block auth-block">
      <div class="section-heading">
        <p class="eyebrow">СКРЫТЫЙ РАЗДЕЛ</p>
        <h1>Авторизация сотрудника</h1>
      </div>
      <form class="form-card compact-form" id="login-form">
        <label>
          <span>Логин</span>
          <input id="login-name" type="text" autocomplete="username">
        </label>
        <label>
          <span>Пароль</span>
          <input id="login-password" type="password" autocomplete="current-password">
        </label>
        <button class="button solid" id="login-button" type="button">ВОЙТИ</button>
        <p class="form-note">Демо-доступ: `admin` / `lingoflux2026`</p>
        <p class="form-note" id="login-status">Используйте служебную учетную запись для доступа к закрытым разделам.</p>
      </form>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="main.js"></script>
  <script src="data-service.js"></script>
  <script src="login.js"></script>
</body>
</html>
